name: Deploy to Bluehost

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 50.6.245.120 >> ~/.ssh/known_hosts

      - name: SSH Test
        run: ssh -o StrictHostKeyChecking=no letmckmy@50.6.245.120 "echo 'SSH connection successful!'"

      - name: Deploy to Bluehost
        run: |
          rsync -avz --delete \
            --exclude=".git" \
            ./ letmckmy@50.6.245.120:/home2/letmckmy/public_html/